name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
    paths-ignore:
      - deployment-status.json
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build
        run: npm run build
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      - name: Record successful deployment
        env:
          GH_TOKEN: ${{ github.token }}
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          payload=$(printf '{"url":"%s","commit":"%s"}\n' "$PAGE_URL" "$GITHUB_SHA" | base64 -w 0)
          gh api --method PUT "repos/${GITHUB_REPOSITORY}/contents/deployment-status.json" \
            -f message="Record successful Pages deployment" \
            -f content="$payload" \
            -f branch="main"
